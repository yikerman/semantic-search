name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff lint
        run: uv run ruff check

      - name: Check Ruff formatting
        run: uv run ruff format --check

      - name: Run Pyright
        run: uv run pyright

      - name: Run ty
        run: uv run ty check

      - name: Build Python package
        run: uv build

  container:
    name: Container image
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: false
          tags: semsearch:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
