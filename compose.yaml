services:
  db:
    restart: unless-stopped
    image: docker.io/pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-semsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semsearch}
      POSTGRES_DB: ${POSTGRES_DB:-semsearch}
    ports:
      # host access is for local admin only; containers use the compose network.
      - "127.0.0.1:5432:5432"
    volumes:
      - ${PGDATA_DIR:-pgdata}:/var/lib/postgresql
    healthcheck:
      # $$ defers expansion to the container shell, where POSTGRES_* are set.
      test: ["CMD-SHELL", "exec pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -t 10"]
      interval: 30s
      timeout: 15s
      retries: 5

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-semsearch}:${POSTGRES_PASSWORD:-semsearch}@db:5432/${POSTGRES_DB:-semsearch}
    extra_hosts:
      # expose potential host openai api
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  daemon:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Containerfile
    command: ["/app/.venv/bin/semsearch", "daemon"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-semsearch}:${POSTGRES_PASSWORD:-semsearch}@db:5432/${POSTGRES_DB:-semsearch}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tokenizer_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  tokenizer_cache:
